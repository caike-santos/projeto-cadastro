<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="stylesheet" href="style.css">
    <script>
        const apiURL = 'http://localhost:3000/usuarios';
        document.addEventListener('DOMContentLoaded', () => {
            
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            listar();
            
        });

        async function listar() {
                const response = await fetch(apiURL);
                const usuarios = await response.json();
                lista.innerHTML = '';

                usuarios.forEach(u => {
                    const li = document.createElement('li');
                    li.innerHTML = `${u.email} - ${u.nome} - <button onclick="deletar('${u.email}')">Excluir</button>`;
                    lista.appendChild(li);
                });
            }


         async function deletar(email) {
                if(confirm("Deseja excluir o usuario do email: " + email)){
                    await fetch(`${apiURL}/${email}`, {
                        method: 'DELETE'
                    });
                    listar(); 
                }
            }
            function sair(){
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div id="form">
        <ul id="lista">
        </ul>
        <button onclick="sair()">Deslogar</button>
    </div>

    
</body>
</html>
