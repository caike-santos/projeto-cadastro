<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="form">
        <div id="titulo">
            <h1>Login</h1>
        </div>
        <div id="caixaNome">
            <label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome" placeholder="Digite seu nome aqui" required>
        </div>
        <br>
        <div id="caixaSenha">
            <label for="isenha">Senha:</label>
            <input type="password" name="senha" id="isenha" placeholder="Digite sua senha aqui" maxlength="12" required minlength="3">
        </div>
        <br>
        <div id="botaoLogin"> <button onclick="logar()">Entrar</button><a href="cadastro.html">Cadastre-se</a></div>

        <div id="caixaMsg"><p id="msg">teste</p></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
